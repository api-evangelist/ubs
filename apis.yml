aid: ubs
url: https://raw.githubusercontent.com/api-evangelist/ubs/refs/heads/main/apis.yml
name: UBS
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Financial
  - Banks
  - Wealth Management
  - Investment Banking
  - Open Banking
description: 'A Swiss multinational investment bank and financial services company and the world''s largest wealth manager. UBS exposes a multi-ecosystem developer platform at developer.ubs.com covering retail banking, mortgages, QR billing, EU PSD2 open banking, Swiss TWINT payments, corporate bLink connectivity, and the enterprise UBS Partner / KeyPort offering.'
created: '2026-05-05'
modified: '2026-05-16'
specificationVersion: '0.19'
apis:
  - aid: ubs:psd2
    name: UBS PSD2 API
    tags:
      - Open Banking
      - PSD2
      - Payments
      - Account Information
      - EU Regulation
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.ubs.com/
    properties:
      - url: https://developer.ubs.com/
        type: Documentation
      - url: https://developer.ubs.com/get-started
        type: GettingStarted
    description: >-
      UBS's EU PSD2-compliant open banking API set covering Account Information
      Services (AIS), Payment Initiation Services (PIS), and Confirmation of
      Funds (CoF). Used by licensed third-party providers to access UBS account
      information and initiate payments on behalf of consenting UBS customers
      under the EU Revised Payment Services Directive.
  - aid: ubs:key4-mortgages
    name: UBS key4 Mortgages API
    tags:
      - Mortgages
      - Lending
      - Real Estate
      - Switzerland
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.ubs.com/
    properties:
      - url: https://developer.ubs.com/
        type: Documentation
    description: >-
      The UBS key4 mortgages API lets property platforms and brokers embed
      Swiss mortgage origination, affordability checks, and indicative
      financing into their own customer journeys. Reference integration with
      Homegate.ch enables property buyers to evaluate financing options
      without manual data entry.
  - aid: ubs:qr-portal
    name: UBS QR Portal API
    tags:
      - QR Bills
      - Payments
      - Invoicing
      - Switzerland
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.ubs.com/
    properties:
      - url: https://developer.ubs.com/
        type: Documentation
    description: >-
      A free programmatic QR-bill creation service supporting the Swiss QR
      payment standard. Returns QR bills in multiple output formats for
      invoicing and accounts-receivable use cases.
  - aid: ubs:twint
    name: UBS TWINT API
    tags:
      - Payments
      - Mobile Payments
      - TWINT
      - Switzerland
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.ubs.com/
    properties:
      - url: https://developer.ubs.com/
        type: Documentation
    description: >-
      UBS integration with TWINT, the Swiss mobile payment scheme, exposing
      merchant and consumer payment flows for in-app and point-of-sale
      checkout.
  - aid: ubs:blink
    name: UBS bLink API
    tags:
      - Corporate Banking
      - Open Banking
      - Payments
      - Cash Management
      - Switzerland
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.ubs.com/
    properties:
      - url: https://developer.ubs.com/
        type: Documentation
    description: >-
      bLink is the open banking platform for UBS corporate clients, exposing
      account information, transaction history, and payment submission so
      ERPs, accounting software, and treasury management systems can connect
      directly to UBS corporate accounts.
  - aid: ubs:partner-keyport
    name: UBS Partner / KeyPort API
    tags:
      - White Label Banking
      - Wealth Management
      - Custody
      - Banking as a Service
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.ubs.com/
    properties:
      - url: https://developer.ubs.com/
        type: Documentation
    description: >-
      UBS Partner and KeyPort form the enterprise integration surface used by
      partner banks, external asset managers (EAMs), and corporate clients to
      embed UBS wealth-management, custody, and banking capabilities into
      their own systems.
  - aid: ubs:banking-ecosystem
    name: UBS Banking Ecosystem API
    tags:
      - Banking
      - Accounts
      - Payments
      - Finance
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.ubs.com/
    properties:
      - url: https://developer.ubs.com/
        type: Documentation
    description: >-
      The umbrella UBS Banking Ecosystem exposes APIs around the broader
      retail and private banking surface, covering account, transaction, and
      product-data services beyond the dedicated mortgage, QR, PSD2, TWINT,
      bLink, and Partner/KeyPort ecosystems.
